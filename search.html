---
layout: default
title: جستجو
permalink: /search/
---
<div class="container" style="padding:32px 0;">
  <h1 style="font-size:28px;">جستجو در تجربه‌ها</h1>
  <div class="search-capsule" style="margin:20px 0 8px; max-width:100%;">
    <input type="text" id="search-input" placeholder="جستجو بر اساس عنوان، شهر، برچسب یا شرکت..." autofocus>
    <button aria-label="جستجو" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    </button>
  </div>
  <p id="search-status" style="color:var(--color-foggy); font-size:14px; margin-bottom:20px;"></p>
  <div class="experience-grid" id="search-results"></div>
</div>

<script>
  window.SEARCH_JSON_URL = "{{ '/search.json' | relative_url }}";
  window.CATEGORY_MAP = {
    {% for cat in site.data.categories %}"{{ cat.id }}": "{{ cat.title }}"{% unless forloop.last %},{% endunless %}{% endfor %}
  };
</script>
<script src="{{ '/assets/js/search.js' | relative_url }}"></script>
