<header class="site-header">
  <div class="container">
    <a href="{{ '/' | relative_url }}" class="logo">زروان</a>
    <button class="nav-toggle" aria-label="باز کردن منو">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <ul class="nav">
      {% for item in site.data.navigation %}
      <li><a href="{{ item.url | relative_url }}" class="{% if page.url == item.url %}active{% endif %}">{{ item.title }}</a></li>
      {% endfor %}
    </ul>
    <div class="header-actions">
      <a href="{{ '/submit/' | relative_url }}" class="btn-cta">ثبت تجربه</a>
    </div>
  </div>
</header>
