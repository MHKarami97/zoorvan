<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<!-- PWA: Web App Manifest (طبق مشخصات رسمی MDN Web App Manifest) -->
<link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
<meta name="theme-color" content="#ff385c">
<meta name="color-scheme" content="light">

<!-- آیکون‌ها برای پلتفرم‌های مختلف -->
<link rel="icon" type="image/png" href="{{ '/assets/icons/favicon.png' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/icons/apple-touch-icon.png' | relative_url }}">

<!-- تنظیمات iOS برای اجرا در حالت standalone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="زروان">

<!-- تنظیمات Windows/Edge Tile -->
<meta name="msapplication-TileColor" content="#ff385c">
<meta name="msapplication-TileImage" content="{{ '/assets/images/icons/icon-144x144.png' | relative_url }}">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/fonts/Vazirmatn-font-face.css' | relative_url }}">
{% seo %}
<link rel="canonical" href="{{ page.url | absolute_url }}">
