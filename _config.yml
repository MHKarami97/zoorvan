title: "زروان"
tagline: "تجربه‌های واقعی مردم؛ راهنمای تصمیم‌گیری بهتر"
description: >-
  زروان بستری برای ثبت و اشتراک‌گذاری تجربه‌های واقعی افراد در زمینه‌های
  مختلف مثل کار در شرکت‌ها، خرید از فروشگاه‌ها، سفر به شهرها، و تعامل با افراد
  خدماتی است تا دیگران با آگاهی بیشتری تصمیم بگیرند.
url: "https://zoorvan.ir" # آدرس اصلی گیت‌هاب‌پیجز خودتان را جایگزین کنید
baseurl: "/" # نام ریپازیتوری؛ اگر ریپو USERNAME.github.io است این را خالی بگذارید ""
lang: fa
lang_dir: rtl
author:
  name: "Mohammad Hossein Karami"
  site: "https://mhkarami97.ir"

# --- فرم ثبت تجربه (Formspree) ---
# شناسه فرم خودتان را از formspree.io دریافت کرده و اینجا جایگزین FORM_ID کنید
formspree_form_id: "mrenagzb"

# --- کالکشن تجربه‌ها ---
collections:
  experiences:
    output: true
    permalink: /experiences/:slug/

defaults:
  - scope:
      path: ""
      type: "experiences"
    values:
      layout: "experience"
  - scope:
      path: ""
    values:
      layout: "default"

# --- دسته‌بندی‌های تجربه ---
# لیست دسته‌بندی‌ها در _data/categories.yml نگهداری می‌شود

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

paginate: 9
paginate_path: "/page:num/"

# فایل‌های PWA باید بدون تغییر مسیر و با نوع MIME صحیح سرو شوند (GitHub Pages به‌صورت پیش‌فرض این کار را انجام می‌دهد)
include:
  - manifest.webmanifest
  - sw.js

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules
